<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Outer rounded square background -->
  <rect width="120" height="120" rx="22" ry="22" fill="url(#bgGrad)" />

  <!-- Subtle shine overlay -->
  <rect width="120" height="60" rx="22" ry="22" fill="url(#shineGrad)" />

  <!-- Decorative top bar (academic stripe) -->
  <rect x="18" y="18" width="84" height="4" rx="2" fill="#ffffff" opacity="0.25" />

  <!-- Open book shape (abstract) -->
  <!-- Left page -->
  <path d="M28 48 L28 82 Q28 85 31 85 L58 80 L58 44 Q55 43 52 43.5 Z"
        fill="#ffffff" opacity="0.12" />
  <!-- Right page -->
  <path d="M92 48 L92 82 Q92 85 89 85 L62 80 L62 44 Q65 43 68 43.5 Z"
        fill="#ffffff" opacity="0.12" />
  <!-- Book spine -->
  <rect x="58" y="43" width="4" height="42" rx="1" fill="#ffffff" opacity="0.2" />

  <!-- "U" letter - bold, centered -->
  <text
    x="60"
    y="78"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="46"
    font-weight="700"
    text-anchor="middle"
    fill="#ffffff"
    letter-spacing="-1"
  >U</text>

  <!-- Small "C" superscript badge -->
  <circle cx="88" cy="36" r="13" fill="#3b82f6" />
  <text
    x="88"
    y="41"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="14"
    font-weight="700"
    text-anchor="middle"
    fill="#ffffff"
  >C</text>

  <!-- Bottom decorative bar -->
  <rect x="18" y="98" width="84" height="4" rx="2" fill="#ffffff" opacity="0.25" />
</svg>

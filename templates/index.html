<!DOCTYPE html>
<html>
<head>
    <title>University Regulation Assistant</title>
</head>
<body>

<h1>University Regulation Assistant</h1>

<form method="POST">
    <input type="text" name="question" size="80" value="{{ question or '' }}" required>
    <button type="submit">Ask</button>
</form>

{% if answer %}
<hr>
<h2>Answer</h2>
<p><strong>Confidence:</strong> {{ confidence }}</p>
<pre style="white-space: pre-wrap; max-width: 900px;">{{ answer }}</pre>
{% endif %}

</body>
</html>

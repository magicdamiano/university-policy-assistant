<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test</title>
</head>
<body>

<h1>Form Test</h1>

<form method="POST">
    <input type="text" name="question" placeholder="Type something">
    <button type="submit">Submit</button>
</form>

{% if response %}

    <p><strong>Answer:</strong> {{ response.answer }}</p>
{% endif %}

</body>
</html>

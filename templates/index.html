<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Regulation Assistant</title>
</head>
<body>
    <h1>University Regulation Assistant</h1>

    <form method="POST" action="/">
        <input
            type="text"
            name="question"
            placeholder="Ask a question about the regulations"
            style="width: 500px;"
            required
        >
        <button type="submit">Ask</button>
    </form>

    {% if answer %}
        <hr>
        <h2>Answer</h2>
        <pre style="white-space: pre-wrap;">{{ answer }}</pre>
    {% endif %}
</body>
</html>
